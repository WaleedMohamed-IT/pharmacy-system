<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الدخول المباشر</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      margin-top: 100px;
    }
    h1 {
      color: #007bff;
    }
    button {
      padding: 10px 20px;
      margin: 20px;
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <h1>مرحباً بك في نظام الصيدلية</h1>
  <button onclick="login()">دخول مباشر</button>
  <button onclick="logout()">خروج</button>

  <script>
    async function login() {
      const response = await fetch("/login", { method: "POST" });
      const result = await response.json();
      if (result.message) {
        window.location.href = "/dashboard.html"; // التحويل المباشر
      }
    }

    async function logout() {
      const response = await fetch("/logout", { method: "POST" });
      const result = await response.json();
      if (result.message) {
        alert(result.message);
        window.location.href = "/";
      }
    }
  </script>
</body>
</html>
