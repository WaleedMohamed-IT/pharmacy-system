<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>قائمة الموردين</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    h2 {
      color: #2e7d32;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th {
      background: #4caf50;
      color: white;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>قائمة الموردين</h2>
  <table>
    <tr>
      <th>اسم الشركة</th>
      <th>الأدوية الموردة</th>
    </tr>
    <tr>
      <td>شركة الحياة</td>
      <td>باراسيتامول، أموكسيسيلين</td>
    </tr>
    <tr>
      <td>شركة الشفاء</td>
      <td>إيبوبروفين، فيتامين C</td>
    </tr>
  </table>
</body>
</html>
