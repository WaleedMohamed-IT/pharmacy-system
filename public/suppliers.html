<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الموردين</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 20px;
      direction: rtl;
      font-weight: bold;
    }
    h2 {
      color: #2e7d32;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th {
      background: #4caf50;
      color: white;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ddd;
    }
    /* تنسيق زر الرجوع */
    .back-btn {
      display: block;
      margin: 30px auto;
      padding: 12px 24px;
      font-weight: bold;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }
    .back-btn:hover {
      background-color: #45a049;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>قائمة الموردين</h2>
  <table>
    <tr>
      <th>اسم المورد</th>
      <th>الأدوية الموردة</th>
      <th>رقم الهاتف</th>
    </tr>
    <tr>
      <td>شركة الحياة</td>
      <td>باراسيتامول، أموكسيسيلين</td>
      <td>01012345678</td>
    </tr>
    <tr>
      <td>شركة الشفاء</td>
      <td>إيبوبروفين، حديد</td>
      <td>01098765432</td>
    </tr>
  </table>

  <!-- زر الرجوع إلى القائمة الرئيسية -->
  <button class="back-btn" onclick="window.location.href='dashboard.html'">
    ⬅️ الرجوع إلى القائمة الرئيسية
  </button>
</body>
</html>
