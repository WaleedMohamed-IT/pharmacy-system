<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تقرير يومي الوارد</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    h2 {
      color: #2e7d32;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th {
      background: #4caf50;
      color: white;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>تقرير يومي الوارد</h2>
  <table>
    <tr>
      <th>اسم الدواء</th>
      <th>عدد العبوات الواردة اليوم</th>
      <th>القسم الداخلي المستفيد</th>
      <th>تاريخ الورود</th>
    </tr>
    <tr>
      <td>باراسيتامول</td>
      <td>100 عبوة</td>
      <td>قسم الأطفال</td>
      <td>2026-04-13</td>
    </tr>
    <tr>
      <td>أموكسيسيلين</td>
      <td>80 عبوة</td>
      <td>قسم الباطنة</td>
      <td>2026-04-13</td>
    </tr>
    <tr>
      <td>إيبوبروفين</td>
      <td>60 عبوة</td>
      <td>قسم العظام</td>
      <td>2026-04-13</td>
    </tr>
    <tr>
      <td>حديد (Ferrous Sulfate)</td>
      <td>90 عبوة</td>
      <td>قسم النساء والولادة</td>
      <td>2026-04-13</td>
    </tr>
  </table>
</body>
</html>
