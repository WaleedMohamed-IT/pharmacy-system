<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy System</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      padding: 0;
      direction: rtl;
      background-color: #f9f9f9;
    }
    header {
      background-color: #4caf50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }
    header span {
      margin-left: 10px;
    }
    nav {
      background-color: #388e3c;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 16px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .welcome {
      text-align: center;
      margin: 20px;
      font-size: 18px;
      color: #333;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .btn {
      background: #4caf50;
      color: white;
      padding: 20px;
      margin: 15px;
      border-radius: 8px;
      cursor: pointer;
      width: 220px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: 0.3s;
      font-size: 16px;
    }
    .btn:hover {
      background: #388e3c;
    }
    .btn.logout {
      background: #f44336;
    }
    .btn.logout:hover {
      background: #d32f2f;
    }
  </style>
  <script>
    function openPage(page) {
      window.location.href = page;
    }
  </script>
</head>
<body>
  <header>
    <span>💊</span> Pharmacy System
  </header>

  <nav>
    <a href="#">الصيدلية</a>
    <a href="#">الموردين</a>
    <a href="#">الدعم الفني</a>
    <a href="#">اداريات</a>
  </nav>

  <div class="welcome">
    مرحباً بك يا مدير النظام (Admin)
  </div>

  <div class="container">
    <div class="btn" onclick="openPage('daily_outgoing.html')">📄 تقرير يومي المنصرف</div>
    <div class="btn" onclick="openPage('medicines.html')">💊 الأدوية</div>
    <div class="btn" onclick="openPage('incoming.html')">📥 الأدوية الواردة</div>
    <div class="btn" onclick="openPage('suppliers.html')">🚚 قائمة الموردين</div>
    <div class="btn logout" onclick="openPage('logout.html')">🔒 تسجيل خروج</div>
  </div>
</body>
</html>
