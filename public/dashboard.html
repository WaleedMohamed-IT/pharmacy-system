<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم - الصيدلية المركزية</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    h1 {
      text-align: center;
      color: #2e7d32;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
    }
    .btn {
      background: #4caf50;
      color: white;
      padding: 20px;
      margin: 15px;
      border-radius: 8px;
      cursor: pointer;
      width: 200px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: 0.3s;
    }
    .btn:hover {
      background: #388e3c;
    }
  </style>
  <script>
    function openPage(page) {
      window.location.href = page;
    }
  </script>
</head>
<body>
  <h1>لوحة التحكم - الصيدلية المركزية</h1>
  <div class="container">
    <div class="btn" onclick="openPage('suppliers.html')">🏢 الموردين</div>
    <div class="btn" onclick="openPage('incoming.html')">📥 الأدوية الواردة</div>
    <div class="btn" onclick="openPage('outgoing.html')">📤 الأدوية المنصرفة</div>
    <div class="btn" onclick="openPage('medicines.html')">💊 الأدوية</div>
    <div class="btn" onclick="openPage('daily_incoming.html')">📅 تقرير يومي الوارد</div>
    <div class="btn" onclick="openPage('daily_outgoing.html')">📅 تقرير يومي المنصرف</div>
  </div>
</body>
</html>
