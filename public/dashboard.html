<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy System - Dashboard</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    header {
      background: #4caf50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    nav {
      background: #388e3c;
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 20px;
      text-align: center;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .btn {
      background: #4caf50;
      color: white;
      padding: 20px;
      border-radius: 8px;
      width: 200px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      background: #2e7d32;
    }
    .logout {
      background-color: #f44336;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 40px;
    }
    .logout:hover {
      background-color: #c62828;
    }
  </style>
</head>
<body>
  <header>💊 Pharmacy System</header>
  <nav>
    <a href="#">الصيدلية</a>
    <a href="#">الموردين</a>
    <a href="#">الدعم الفني</a>
    <a href="#">اداريات</a>
  </nav>

  <div class="container">
    <h2>مرحباً بك يا مدير النظام (Admin)</h2>

    <div class="buttons">
      <div class="btn" onclick="openPage('suppliers.html')">🚚 قائمة الموردين</div>
      <div class="btn" onclick="openPage('incoming.html')">📥 الأدوية الواردة</div>
      <div class="btn" onclick="openPage('outgoing.html')">📤 الأدوية المنصرفة</div>
      <div class="btn" onclick="openPage('daily_outgoing.html')">🗓 تقرير يومي المنصرف</div>
    </div>

    <button class="logout" onclick="logout()">🔒 تسجيل خروج</button>
  </div>

  <script>
    function openPage(page) {
      window.location.href = page;
    }

    async function logout() {
      const response = await fetch("/logout", { method: "POST" });
      const result = await response.json();
      if (result.message) {
        alert(result.message);
        window.location.href = "/";
      }
    }
  </script>
</body>
</html>
