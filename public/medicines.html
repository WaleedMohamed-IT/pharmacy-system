<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الأدوية المتوفرة بالمستشفى</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    h2 {
      color: #2e7d32;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    th {
      background: #4caf50;
      color: white;
    }
    th, td {
      padding: 12px;
      text-align: center;
      border: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>قائمة الأدوية المتوفرة بالمستشفى</h2>
  <table>
    <tr>
      <th>اسم الدواء</th>
      <th>الكمية المتوفرة</th>
      <th>القسم الداخلي</th>
    </tr>
    <tr>
      <td>باراسيتامول</td>
      <td>300 عبوة</td>
      <td>قسم الأطفال</td>
    </tr>
    <tr>
      <td>أموكسيسيلين</td>
      <td>250 عبوة</td>
      <td>قسم الباطنة</td>
    </tr>
    <tr>
      <td>إيبوبروفين</td>
      <td>180 عبوة</td>
      <td>قسم العظام</td>
    </tr>
    <tr>
      <td>حديد (Ferrous Sulfate)</td>
      <td>200 عبوة</td>
      <td>قسم النساء والولادة</td>
    </tr>
    <tr>
      <td>فيتامين C</td>
      <td>150 عبوة</td>
      <td>قسم الأطفال</td>
    </tr>
  </table>
</body>
</html>
