<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy System</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      background-color: #eafaf1;
      direction: rtl;
    }
    header {
      background-color: #16a085;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
    }
    nav {
      background-color: #1abc9c;
      display: flex;
      justify-content: center;
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
      font-weight: bold;
    }
    nav a:hover {
      background-color: #0e6655;
    }
    .container {
      padding: 20px;
    }
    h2 {
      color: #2c3e50;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background-color: white;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #1abc9c;
      color: white;
    }
    table tr:hover {
      background-color: #d1f2eb;
    }
    table tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    .dashboard {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }
    .card {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      width: 40%;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card h3 {
      margin: 0;
      color: #16a085;
    }
    .card p {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
    }
  </style>
</head>
<body>
  <header>
    <h1>💊 Pharmacy System</h1>
  </header>
  <nav>
    <a href="#medicines">💊 الأدوية</a>
    <a href="#users">👤 المستخدمين</a>
  </nav>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="card">
      <h3>عدد الأدوية</h3>
      <p id="medicine-count">0</p>
    </div>
    <div class="card">
      <h3>عدد المستخدمين</h3>
      <p id="user-count">0</p>
    </div>
  </div>

  <div class="container">
    <h2 id="medicines">قائمة الأدوية</h2>
    <table id="medicines-table">
      <tr>
        <th>اسم الدواء</th>
        <th>الكمية</th>
        <th>السعر</th>
      </tr>
    </table>

    <h2 id="users">قائمة المستخدمين</h2>
    <table id="users-table">
      <tr>
        <th>الاسم</th>
        <th>البريد الإلكتروني</th>
        <th>الدور</th>
      </tr>
    </table>
  </div>

  <script>
    // جلب قائمة الأدوية
    fetch('https://pharmacy-system-production-f1ea.up.railway.app/medicines')
      .then(response => response.json())
      .then(data => {
        const table = document.querySelector("#medicines-table");
        const count = document.querySelector("#medicine-count");
        count.textContent = data.length; // عدد الأدوية
        data.forEach(med => {
          const row = `<tr>
            <td>${med.name}</td>
            <td>${med.quantity}</td>
            <td>${med.price}</td>
          </tr>`;
          table.innerHTML += row;
        });
      });

    // جلب قائمة المستخدمين
    fetch('https://pharmacy-system-production-f1ea.up.railway.app/users')
      .then(response => response.json())
      .then(data => {
        const table = document.querySelector("#users-table");
        const count = document.querySelector("#user-count");
        count.textContent = data.length; // عدد المستخدمين
        data.forEach(user => {
          const row = `<tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.role}</td>
          </tr>`;
          table.innerHTML += row;
        });
      });
  </script>
</body>
</html>
