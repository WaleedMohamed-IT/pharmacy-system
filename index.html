<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Pharmacy System</title>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      direction: rtl;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    nav {
      background-color: #34495e;
      display: flex;
      justify-content: center;
    }
    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }
    nav a:hover {
      background-color: #1abc9c;
    }
    .container {
      padding: 20px;
    }
    h2 {
      color: #2c3e50;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background-color: white;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #1abc9c;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Pharmacy System</h1>
  </header>
  <nav>
    <a href="#medicines">الأدوية</a>
    <a href="#users">المستخدمين</a>
  </nav>
  <div class="container">
    <h2 id="medicines">قائمة الأدوية</h2>
    <table id="medicines-table">
      <tr>
        <th>اسم الدواء</th>
        <th>الكمية</th>
        <th>السعر</th>
      </tr>
    </table>

    <h2 id="users">قائمة المستخدمين</h2>
    <table id="users-table">
      <tr>
        <th>الاسم</th>
        <th>البريد الإلكتروني</th>
        <th>الدور</th>
      </tr>
    </table>
  </div>

  <script>
    // جلب قائمة الأدوية
    fetch('https://pharmacy-system-production-f1ea.up.railway.app/medicines')
      .then(response => response.json())
      .then(data => {
        const table = document.querySelector("#medicines-table");
        data.forEach(med => {
          const row = `<tr>
            <td>${med.name}</td>
            <td>${med.quantity}</td>
            <td>${med.price}</td>
          </tr>`;
          table.innerHTML += row;
        });
      });

    // جلب قائمة المستخدمين
    fetch('https://pharmacy-system-production-f1ea.up.railway.app/users')
      .then(response => response.json())
      .then(data => {
        const table = document.querySelector("#users-table");
        data.forEach(user => {
          const row = `<tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${user.role}</td>
          </tr>`;
          table.innerHTML += row;
        });
      });
  </script>
</body>
</html>
